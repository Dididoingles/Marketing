<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page - Ciência e Educação</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* --- 1. BACKGROUND COM BLUR --- */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: url('https://images2.imgbox.com/15/a0/VGx3WUbc_o.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(10px);
            -webkit-filter: blur(10px);
        }

        /* --- 2. CONTEÚDO PRINCIPAL --- */
        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            /* Move para a esquerda aos 3s */
            animation: moveEverythingLeft 1s ease-in-out 3s forwards;
        }

        /* --- 3. FOTO (SEM BORDA PRETA) --- */
        .profile-pic {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            outline: 5px solid #fff; /* Borda branca nítida */
            
            /* Sombra interna (inset) para eliminar o aro preto da imagem original */
            box-shadow: 
                inset 0 0 15px rgba(255, 244, 224, 0.6), 
                0 0 20px rgba(255, 244, 224, 0.5);
            
            /* Animação de pulsar o brilho */
            animation: pulseGlow 2s infinite ease-in-out;
            transition: box-shadow 0.5s ease;
        }

        /* --- 4. CONTAINER DO TEXTO --- */
        .text-container {
            display: flex;
            align-items: center;
            overflow: hidden;
            padding-left: 0;
            animation: expandSpace 1s ease-in-out 3s forwards;
        }

        /* --- 5. TEXTO TYPEWRITER (50% MENOR + CURSOR COLADO) --- */
        .typewriter-text {
            color: #fff;
            font-size: 1.15rem; /* Reduzido em 50% conforme pedido */
            font-weight: 600;
            line-height: 1;
            letter-spacing: 0;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            /* Cursor branco quente */
            border-right: 3px solid rgba(255, 244, 224, 1);
            
            /* Sincronização: 52 caracteres aproximados na frase */
            animation: 
                typing 3s steps(52, end) 4s forwards,
                blink-caret .75s step-end infinite;
        }

        /* --- KEYFRAMES --- */

        @keyframes pulseGlow {
            0%, 100% { box-shadow: inset 0 0 15px rgba(255, 244, 224, 0.5), 0 0 20px rgba(255, 244, 224, 0.5); }
            50% { box-shadow: inset 0 0 25px rgba(255, 244, 224, 0.8), 0 0 40px rgba(255, 244, 224, 1); }
        }

        @keyframes moveEverythingLeft {
            from { justify-content: center; }
            to { justify-content: flex-start; padding-left: 15%; }
        }

        @keyframes expandSpace {
            from { padding-left: 0; }
            to { padding-left: 30px; }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: rgba(255, 244, 224, 1); }
        }

        /* --- ESTADO FINAL (ESTÁTICO COM BRILHO) --- */
        .main-content {
            /* Após 7s (3s espera + 1s move + 3s digita), pausamos e brilhamos */
            animation: 
                moveEverythingLeft 1s ease-in-out 3s forwards,
                stopAnimations 0.1s linear 7s forwards;
        }

        @keyframes stopAnimations {
            to { animation-play-state: paused; }
        }

        /* Aplica o brilho final quando a animação pausa */
        .main-content[style*="paused"] .profile-pic,
        .main-content[style*="paused"] .typewriter-text {
            box-shadow: 0 10px 40px rgba(255, 244, 224, 1) !important;
            animation: none !important;
            border-right: none !important; /* Remove o cursor no final */
        }

    </style>
</head>
<body>

    <div class="hero-background"></div>

    <main class="main-content">
        <img src="https://images2.imgbox.com/31/9a/S7Gg4KSl_o.jpg" alt="Foto Diandra" class="profile-pic">
        
        <div class="text-container">
            <p class="typewriter-text">Onde o amor pela ciência e a educação se encontram.</p>
        </div>
    </main>

    <script>
        // Pequeno script para forçar o estado final após as animações
        setTimeout(() => {
            document.querySelector('.main-content').style.animationPlayState = 'paused';
        }, 7100);
    </script>
</body>
</html>
