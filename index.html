<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introdução - Ciência e Educação (Corrigido)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #000;
            overflow: hidden;
        }

        /* --- 1. BACKGROUND (ISOLADO COM BLUR) --- */
        .hero-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            
            background-image: url('https://images2.imgbox.com/15/a0/VGx3WUbc_o.jpg');
            background-size: cover;
            background-position: center;
            
            filter: blur(10px);
            -webkit-filter: blur(10px);
        }

        /* --- 2. CONTEÚDO PRINCIPAL --- */
        .main-content {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center; /* Centralizado inicialmente */
            height: 100vh;
            width: 100%;
            
            /* ANIMAÇÃO 1: Mover para a esquerda aos 3s, dura 1s */
            animation: moveEverythingLeft 1s ease-in-out 3s forwards;
        }

        /* --- 3. FOTO REDONDA (CORREÇÃO DE BORDAS E BRILHO) --- */
        .profile-pic {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            object-fit: cover; /* Imagem preenche o círculo */
            position: relative;
            left: 0; 
            
            /* CORREÇÃO AQUI: Removemos o border anterior */
            /* border: 6px solid #fff; */
            
            /* CORREÇÃO AQUI: Usamos outline e box-shadow para o brilho perfeito */
            outline: 6px solid #fff; /* Borda branca nítida */
            box-shadow: 
                0 0 0 6px rgba(255, 244, 224, 0.4), /* Brilho quente suave na borda */
                0 10px 30px rgba(255, 244, 224, 0.8); /* Brilho quente principal embaixo */
            
            /* ANIMAÇÃO 2: Pulsar suavemente a sombra */
            /* Começa imediatamente, dura 2s, infinita */
            animation: pulseGlow 2s infinite ease-in-out;
            
            transition: box-shadow 0.5s ease; 
        }

        /* --- 4. CONTAINER DO TEXTO --- */
        .text-container {
            display: flex;
            align-items: center;
            height: 200px; /* Alinhamento vertical perfeito com a foto */
            overflow: hidden; /* Texto escondido */
            padding-left: 0; 
            
            /* ANIMAÇÃO 3: Criar espaço para o texto aos 3s, dura 1s */
            animation: expandSpaceForText 1s ease-in-out 3s forwards;
        }

        /* --- 5. TEXTO TYPEWRITER (CORREÇÃO DE SINCRONIA) --- */
        .typewriter-text {
            color: #fff;
            font-size: 2.3rem; /* Tamanho do lema */
            font-weight: 600; /* Semi-bold */
            line-height: 1; /* Conforme guideline */
            letter-spacing: 0; /* Conforme guideline */
            
            white-space: nowrap; /* Impede quebra de linha */
            width: 0; /* Começa com largura zero */
            overflow: hidden; /* Esconde caracteres extras */
            
            /* Cursor piscante (Warm White) */
            border-right: .15em solid rgba(255, 244, 224, 0.9);
            
            /* CORREÇÃO AQUI: Animação sincronizada com Poppins */
            /* typing: começa aos 4s, dura 2.5s (mais rápido) */
            animation: 
                typing 2.5s steps(45, end) 4s forwards,
                blink-caret .75s step-end 4s infinite;
        }

        /* --- 6. ESTADO FINAL ESTÁTICO --- */
        /* Esta classe é ativada via animação timing */
        .main-content.final-static-glow .profile-pic,
        .main-content.final-static-glow .typewriter-text {
            box-shadow: 0 15px 50px rgba(255, 244, 224, 1) !important;
            border-color: rgba(255, 244, 224, 0.7); 
        }

        /* =========================================
           ANIMAÇÕES (KEYFRAMES)
           ========================================= */

        /* A. Pulsar suavemente a sombra da foto */
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 20px rgba(255, 244, 224, 0.7); }
            50% { box-shadow: 0 0 40px rgba(255, 244, 224, 1); }
            100% { box-shadow: 0 0 20px rgba(255, 244, 224, 0.7); }
        }

        /* B. Mover para a esquerda (centralizado final) */
        @keyframes moveEverythingLeft {
            from { justify-content: center; }
            to { justify-content: flex-start; padding-left: 10%; } 
        }

        /* C. Criar espaço para o texto */
        @keyframes expandSpaceForText {
            from { padding-left: 0; }
            to { padding-left: 40px; } /* Espaço final */
        }

        /* D. Efeito Typewriter (revelar largura de forma sincronizada) */
        @keyframes typing {
            from { width: 0; }
            /* CORREÇÃO AQUI: Usando max-width para melhor renderização */
            to { width: 100%; max-width: 100%; } 
        }

        /* E. Cursor piscante */
        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: rgba(255, 244, 224, 0.9); }
        }

        /* F. Acionar o Estado Final Estático (timing) */
        @keyframes triggerFinalState {
            to { 
                /* Pausa animações infinitas */
                animation-play-state: paused; 
            }
        }
        
        /* Aplicando o trigger final após tudo (4s + 2.5s = 6.5s) */
        .main-content {
            animation: 
                moveEverythingLeft 1s ease-in-out 3s forwards,
                triggerFinalState 0.1s linear 6.6s forwards; /* Ativa logo após digitar */
        }
        
        /* Quando triggerFinalState termina, aplica o estilo estático */
        .main-content[style*="animation-play-state: paused"] .profile-pic {
             box-shadow: 0 15px 50px rgba(255, 244, 224, 1) !important;
             animation: none !important; /* Para pulsações */
        }
        
        .main-content[style*="animation-play-state: paused"] .typewriter-text {
             box-shadow: 0 10px 30px rgba(255, 244, 224, 0.8);
             animation: none !important; /* Para digitação */
             border-right: none !important; /* Remove o cursor */
        }

    </style>
</head>
<body>

    <div class="hero-background"></div>

    <main class="main-content">
        
        <img src="https://images2.imgbox.com/31/9a/S7Gg4KSl_o.jpg" alt="Foto" class="profile-pic">
        
        <div class="text-container">
            <p class="typewriter-text">Onde o amor pela ciência e a educação se encontram.</p>
        </div>

    </main>

</body>
</html>
